<div class="max-w-2xl mx-auto px-4 py-10">

  <!-- Back -->
  <a routerLink="/" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-8 transition-colors">
    ← All tools
  </a>

  <!-- Tool Header -->
  <div class="text-center mb-10">
    <div class="w-16 h-16 bg-purple-100 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">🔄</div>
    <h1 class="text-3xl font-bold text-gray-900">Rotate PDF</h1>
    <p class="text-gray-500 mt-2">Rotate all or selected pages in your PDF</p>
  </div>

  @if (!success()) {
    <!-- Upload -->
    <app-file-upload [multiple]="false" (filesChanged)="onFileChanged($event)" />

    @if (file()) {
      <!-- Angle Selector -->
      <div class="mt-6">
        <label class="block text-sm font-medium text-gray-700 mb-3">Rotation angle</label>
        <div class="flex gap-3">
          @for (option of angleOptions; track option.value) {
            <button
              type="button"
              (click)="setAngle(option.value)"
              class="flex-1 py-3 rounded-xl font-medium text-sm border transition-all"
              [class.bg-purple-500]="angle() === option.value"
              [class.text-white]="angle() === option.value"
              [class.border-purple-500]="angle() === option.value"
              [class.bg-white]="angle() !== option.value"
              [class.text-gray-600]="angle() !== option.value"
              [class.border-gray-200]="angle() !== option.value">
              {{ option.label }}
            </button>
          }
        </div>
      </div>

      <!-- Pages Input (optional) -->
      <div class="mt-5">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Pages <span class="text-gray-400 font-normal">(optional — leave blank for all)</span>
        </label>
        <input
          type="text"
          [value]="pages()"
          (input)="onPagesInput($event)"
          placeholder="e.g. 1, 3, 5"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300 focus:border-transparent">
      </div>

      <!-- Action Button -->
      <button
        (click)="rotate()"
        [disabled]="isLoading()"
        class="mt-6 w-full bg-purple-500 hover:bg-purple-600 disabled:bg-purple-300 disabled:cursor-not-allowed text-white font-semibold py-4 rounded-xl transition-colors text-base">
        @if (isLoading()) {
          <span class="flex items-center justify-center gap-2">
            <span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            Rotating...
          </span>
        } @else {
          Rotate PDF {{ angle() }}°
        }
      </button>
    }

    <!-- Error -->
    @if (error()) {
      <div class="mt-4 bg-red-50 border border-red-100 text-red-600 rounded-xl p-4 text-sm">
        {{ error() }}
      </div>
    }
  }

  <!-- Success -->
  @if (success()) {
    <div class="bg-green-50 border border-green-100 rounded-2xl p-8 text-center">
      <div class="text-4xl mb-3">✅</div>
      <h2 class="text-xl font-semibold text-green-800 mb-1">PDF rotated successfully!</h2>
      <p class="text-green-600 text-sm">Your download started automatically.</p>
      <button (click)="reset()" class="mt-6 px-6 py-2 bg-white border border-gray-200 text-gray-600 rounded-xl text-sm hover:bg-gray-50 transition-colors">
        Rotate another PDF
      </button>
    </div>
  }

</div>
