<a [routerLink]="tool().route"
  class="flex flex-col h-full p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all duration-200 cursor-pointer group">

  <!-- Icon -->
  <div class="w-14 h-14 rounded-xl flex items-center justify-center text-2xl mb-5"
    [style.background]="tool().bgColor">
    {{ tool().icon }}
  </div>

  <!-- Text -->
  <h3 class="font-semibold text-gray-800 mb-2 transition-colors group-hover:text-red-500">
    {{ tool().title }}
  </h3>
  <p class="flex-1 text-sm text-gray-500 leading-relaxed">{{ tool().description }}</p>

  <!-- Arrow -->
  <div class="mt-4 text-xs font-medium flex items-center gap-1 text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
    Get started →
  </div>

</a>
